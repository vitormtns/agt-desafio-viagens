# ─── Banco H2 em memória ───────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:viagens;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# ─── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# ─── JWT (valores via variável de ambiente em produção) ────────────────────────
# Produção: export JWT_SECRET=$(openssl rand -base64 32)
jwt.secret=${JWT_SECRET:agt-dev-secret-minimo-32-bytes-aqui!}
jwt.expiration=3600
jwt.refresh-expiration=604800

# ─── Servidor ──────────────────────────────────────────────────────────────────
server.port=8080

# ─── Logs ──────────────────────────────────────────────────────────────────────
logging.level.com.agt=INFO
logging.level.org.springframework.security=WARN

# ─── Ativar perfil dev para H2 Console e SQL logging ──────────────────────────
# Execute com: mvn spring-boot:run -Dspring-boot.run.profiles=dev
